<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kite Dashboard Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .mac-window {
      width: 100%;
      max-width: 1200px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.15),
        0 30px 80px rgba(0,0,0,0.35),
        0 10px 30px rgba(0,0,0,0.2);
    }

    .mac-titlebar {
      background: linear-gradient(to bottom, #ebebeb, #d6d6d6);
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid #c0c0c0;
      flex-shrink: 0;
    }

    .mac-btn {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .mac-btn.red    { background: #ff5f57; border: 0.5px solid #e0443e; }
    .mac-btn.yellow { background: #febc2e; border: 0.5px solid #d4a017; }
    .mac-btn.green  { background: #28c840; border: 0.5px solid #1aab29; }

    .mac-urlbar {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .mac-url {
      background: rgba(255,255,255,0.7);
      border: 0.5px solid rgba(0,0,0,0.18);
      border-radius: 6px;
      padding: 3px 12px;
      font-size: 12px;
      color: #444;
      max-width: 320px;
      width: 100%;
      text-align: center;
      letter-spacing: -0.01em;
    }

    .mac-content {
      width: 100%;
      height: 720px;
      border: none;
      display: block;
      background: #FAFAF7;
    }
  </style>
</head>
<body>
  <div class="mac-window">
    <div class="mac-titlebar">
      <div class="mac-btn red"></div>
      <div class="mac-btn yellow"></div>
      <div class="mac-btn green"></div>
      <div class="mac-urlbar">
        <div class="mac-url">app.kiteline.ie/dashboard</div>
      </div>
    </div>
    <iframe
      class="mac-content"
      src="http://localhost:3000/dashboard?period=month"
      scrolling="no"
    ></iframe>
  </div>
</body>
</html>
